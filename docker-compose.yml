services:

  # -----------------------------------------------------------------------
  # Kafka — runs on the dedicated host machine.
  # Set KAFKA_LAN_IP below to this machine's LAN IP before running.
  # After any change: docker compose down && docker compose up -d kafka
  # -----------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.9.0
    hostname: kafka-host
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-host:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENERS: INTERNAL://kafka-host:29092,CONTROLLER://kafka-host:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-host:29092,EXTERNAL://192.168.0.139:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168

  # -----------------------------------------------------------------------
  # Ingester — fetches books from Gutenberg, uploads to GCS, queues to Kafka
  # Usage: docker compose run ingester python -m main --limit 100
  # -----------------------------------------------------------------------
  ingester:
    build:
      context: ./server
      dockerfile: ingester/Dockerfile
    env_file: ./server/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/creds/key.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/creds/key.json:ro

  # -----------------------------------------------------------------------
  # Chunker — splits book texts into sections, produces to book-chunks
  # Usage: docker compose up chunker
  # -----------------------------------------------------------------------
  chunker:
    build:
      context: ./server
      dockerfile: chunker/Dockerfile
    env_file: ./server/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/creds/key.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/creds/key.json:ro

  # -----------------------------------------------------------------------
  # NLP Worker — analyzes chunks, produces arc scores to arc-events
  # Scale up for faster processing: docker compose up --scale nlp-worker=4
  # -----------------------------------------------------------------------
  nlp-worker:
    build:
      context: ./server
      dockerfile: nlp-worker/Dockerfile
    env_file: ./server/.env

  # -----------------------------------------------------------------------
  # Stream Processor (Kotlin) — consumes arc-events, writes to BigQuery
  # Usage: docker compose up stream-processor
  # -----------------------------------------------------------------------
  stream-processor:
    build: ./server/stream-processor
    env_file: ./server/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/creds/key.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/creds/key.json:ro
