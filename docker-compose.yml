services:

  # -----------------------------------------------------------------------
  # Usage: KAFKA_HOST_IP=192.168.1.50 docker compose up -d kafka
  # -----------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://${KAFKA_HOST_IP:-localhost}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168

  # -----------------------------------------------------------------------
  # Ingester — fetches books from Gutenberg, uploads to GCS, queues to Kafka
  # Usage: docker compose run ingester python -m main --limit 100
  # -----------------------------------------------------------------------
  ingester:
    build:
      context: ./server
      dockerfile: ingester/Dockerfile
    env_file: ./server/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/creds/key.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/creds/key.json:ro

  # -----------------------------------------------------------------------
  # Chunker — splits book texts into sections, produces to book-chunks
  # Usage: docker compose up chunker
  # -----------------------------------------------------------------------
  chunker:
    build:
      context: ./server
      dockerfile: chunker/Dockerfile
    env_file: ./server/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/creds/key.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/creds/key.json:ro

  # -----------------------------------------------------------------------
  # NLP Worker — analyzes chunks, produces arc scores to arc-events
  # Scale up for faster processing: docker compose up --scale nlp-worker=4
  # -----------------------------------------------------------------------
  nlp-worker:
    build:
      context: ./server
      dockerfile: nlp-worker/Dockerfile
    env_file: ./server/.env
